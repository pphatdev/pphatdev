name: Daily README Update

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bar_style:
        description: 'Progress bar style (block | shade | ascii | dot | arrow | pipe)'
        required: false
        default: 'block'
        type: choice
        options:
          - block
          - shade
          - ascii
          - dot
          - pipe
          - emoji

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update README stats
        id: update_stats
        uses: pphatdev/pphatdev@v1.0.3
        # uses: ./
        with:
          waka-token: ${{ secrets.WAKA_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bar-style: ${{ github.event.inputs.bar_style || vars.BAR_STYLE || 'block' }}

      - name: Commit and push changes
        if: steps.update_stats.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): update daily coding stats"
          file_pattern: "README.md data/coding_stats.json"
          branch: main





