name: Daily README Update

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bar_style:
        description: 'Progress bar style (block | shade | ascii | dot | arrow | pipe)'
        required: false
        default: 'block'
        type: choice
        options:
          - block
          - shade
          - ascii
          - dot
          - pipe
          - emoji

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies and create .env
        env:
          WAKA_TOKEN: ${{ secrets.WAKA_KEY }}
          BAR_STYLE_INPUT: ${{ github.event.inputs.bar_style }}
          BAR_STYLE_DEFAULT: ${{ vars.BAR_STYLE }}
        run: |
          cp .env.example .env
          printf "\nGITHUB_TOKEN=%s\n" "${{ secrets.GITHUB_TOKEN }}" >> .env
          printf "WAKA_TOKEN=%s\n" "$WAKA_TOKEN" >> .env
          printf "BAR_STYLE=%s\n" "${BAR_STYLE_INPUT:-${BAR_STYLE_DEFAULT:-block}}" >> .env
          grep -vE '^(GITHUB_TOKEN|WAKA_TOKEN)=' .env
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        run: python src/main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): update daily coding stats"
          file_pattern: "README.md data/coding_stats.json"
          branch: main



